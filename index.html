<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hero">
        <h1 id="title">Metric/Imperial Unit Converter</h1>
        <input type="text" id="input" placeholder="0">
        <button id="convert-btn">Convert</button>
    </div>
    <div class="results">
        <div class="unit-section">
            <h2>Length (Meter/Feet)</h2>
            <p id="length">0 meters = 0 feet | 0 feet = 0 meters</p>
        </div>
        <div class="unit-section">
            <h2>Volume (Liters/Gallons)</h2>
            <p id="volume">0 liters = 0 gallons | 0 gallons = 0 liters</p>
        </div>
        <div class="unit-section">
            <h2>Mass (Kilograms/Pounds)</h2>
            <p id="mass">0 kilograms = 0 pounds | 0 pounds = 0 kilograms</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
